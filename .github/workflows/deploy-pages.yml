name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          registry-url: https://tr1.jfrog.io/tr1/api/npm/npm/
          always-auth: true
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.JFROG_NPM_TOKEN }}
        run: npm ci

      - name: Build
        working-directory: web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.JFROG_NPM_TOKEN }}
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Resolve deploy directory
        shell: pwsh
        run: |
          $base = "web/dist/poc-ait-evidence-matching-program"
          if (Test-Path "$base/browser") {
            "DEPLOY_DIR=$base/browser" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "DEPLOY_DIR=$base" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
