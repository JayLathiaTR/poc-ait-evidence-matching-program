name: Build Desktop .NET App

on:
  push:
    branches: [master, main]
    tags-ignore:
      - '*'
    paths:
      - 'desktop-ait-evidence-matching/**'
      - '.github/workflows/desktop-dotnet-build.yml'
  pull_request:
    paths:
      - 'desktop-ait-evidence-matching/**'
      - '.github/workflows/desktop-dotnet-build.yml'
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore desktop-ait-evidence-matching/AitEvidenceMatching.sln

      - name: Build
        run: dotnet build desktop-ait-evidence-matching/AitEvidenceMatching.sln --configuration Release --no-restore
