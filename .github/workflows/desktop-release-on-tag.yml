name: Build Desktop Executable On Tag

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload (example: v1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-desktop:
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      NPM_REGISTRY_URL: https://tr1.jfrog.io/tr1/api/npm/npm/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: ${{ env.NPM_REGISTRY_URL }}
          always-auth: true

      - name: Validate npm auth token
        shell: pwsh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TR_JFROG_NPM_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NODE_AUTH_TOKEN)) {
            throw "Missing secret TR_JFROG_NPM_TOKEN. Add your TR JFrog npm token in repository secrets."
          }

      - name: Install OCR server dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TR_JFROG_NPM_TOKEN }}
        run: npm ci --omit=dev --prefix server --no-audit --fund=false

      - name: Restore
        run: dotnet restore desktop-ait-evidence-matching/AitEvidenceMatching.sln

      - name: Publish app (win-x64)
        run: dotnet publish desktop-ait-evidence-matching/AitEvidenceMatching.App/AitEvidenceMatching.App.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Stage executable artifact
        shell: pwsh
        run: |
          $tag = "${{ env.TAG_NAME }}"
          $publishDir = "desktop-ait-evidence-matching/AitEvidenceMatching.App/bin/Release/net10.0/win-x64/publish"
          $nodeExe = (Get-Command node).Source
          $nodeDir = Split-Path $nodeExe -Parent
          New-Item -ItemType Directory -Path "$publishDir/node" -Force | Out-Null
          Copy-Item "$nodeDir/*" "$publishDir/node" -Recurse -Force

          New-Item -ItemType Directory -Path "release-artifacts" -Force | Out-Null
          Compress-Archive -Path "$publishDir\*" -DestinationPath "release-artifacts/AitEvidenceMatching.App-$tag-win-x64.zip" -Force

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: AitEvidenceMatching.App-${{ env.TAG_NAME }}-win-x64
          path: release-artifacts/*.zip

      - name: Upload executable to release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: release-artifacts/*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
